<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    >
    <title>云汲仙田录</title>
    <style>
        /* ============================================================
         * 全局重置 - 全屏无滚动游戏画布
         * ============================================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            /* 禁止选择/拖拽，防止游戏内误触 */
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        /* 游戏容器 - PixiJS Canvas 挂载点 */
        #game-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #game-container canvas {
            display: block;
            /* 像素完美缩放：临近像素插值，保持像素风格锐利 */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* 加载提示 - 引擎启动前显示 */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #8b7355;
            font-family: 'SimSun', 'STSong', serif;
            font-size: 1.2rem;
            letter-spacing: 0.15em;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-overlay .title {
            font-size: 2rem;
            color: #c9a96e;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        #loading-overlay .progress-bar {
            width: 200px;
            height: 2px;
            background: #2a2a2a;
            border-radius: 1px;
            overflow: hidden;
            margin-top: 1rem;
        }

        #loading-overlay .progress-bar .fill {
            width: 0%;
            height: 100%;
            background: #c9a96e;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- ============================================================
         加载遮罩层 - 在引擎初始化完成前显示
         ============================================================ -->
    <div id="loading-overlay">
        <div class="title">云汲仙田录</div>
        <div>天道初启 · 万象更新</div>
        <div class="progress-bar">
            <div class="fill" id="loading-progress"></div>
        </div>
    </div>

    <!-- ============================================================
         游戏容器 - PixiJS Canvas 挂载点
         ============================================================ -->
    <div id="game-container"></div>

    <!-- ============================================================
         PixiJS 运行时 - 通过 CDN 加载
         v8+ 版本，WebGL 2D 渲染核心
         ============================================================ -->
    <script
        src="https://cdn.jsdelivr.net/npm/pixi.js@8.x/dist/pixi.min.js"
        integrity="sha384-..."
        crossorigin="anonymous"
    ></script>

    <!-- ============================================================
         引擎入口 - 渲染进程启动脚本
         负责：初始化引擎核心 → 配置渲染管线 → 启动游戏循环
         ============================================================ -->
    <script type="module" src="./src/engine/render/index.js"></script>

</body>
</html>
